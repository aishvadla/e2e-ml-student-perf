name: mlapp-workflow

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  integration:
    name: Continuous Integration
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python 3.13
      uses: actions/setup-python@v4
      with:
        python-version: "3.13"
        
    - name: Check code formatting with Black
      run: |
        pip install black
        black --check .

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Tests with Coverage
      run: |
        python -m pytest tests/ --cov=src

  build-push-docker-image:
    name: Continuous Delivery
    needs: integration
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
    - name: Checkout code
    - uses: actions/checkout@v3

    - name: Log in to DockerHub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build, Tag and Push Docker Image
      run: |        
        docker build -t avadlamu/ml-app-student-perf:v${{ github.run_number }} .
        docker push avadlamu/ml-app-student-perf:v${{ github.run_number }}
        
        docker tag avadlamu/ml-app-student-perf:v${{ github.run_number }} avadlamu/ml-app-student-perf:latest
        docker push avadlamu/ml-app-student-perf:latest