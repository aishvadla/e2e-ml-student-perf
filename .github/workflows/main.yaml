name: mlapp-workflow

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  integration:
    name: Continuous Integration
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python 3.13
      uses: actions/setup-python@v4
      with:
        python-version: "3.13"
        
    - name: Check code formatting with Black
      run: |
        pip install black
        black --check .

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Tests with Coverage
      run: |
        python -m pytest tests/ --cov=src

  build-push-docker-image:
    name: Continuous Delivery
    needs: integration
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Log in to DockerHub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build, Tag and Push Docker Image
      run: |        
        docker build -t avadlamu/ml-app-student-perf:v${{ github.run_number }} .
        docker push avadlamu/ml-app-student-perf:v${{ github.run_number }}
        
        docker tag avadlamu/ml-app-student-perf:v${{ github.run_number }} avadlamu/ml-app-student-perf:latest
        docker push avadlamu/ml-app-student-perf:latest

  continuous-deployment:
    name: Continuous Deployment
    runs-on: ubuntu-latest
    needs: build-push-docker-image
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-west-2

      - name: Deploy to EB
        uses: einaregilsson/beanstalk-deploy@v21
        with:
          aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          application_name: student-performance-app
          environment_name: Student-performance-app-env
          version_label: ${{ github.run_number }}
          region: us-west-2
          deployment_package: Dockerrun.aws.json